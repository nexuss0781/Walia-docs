<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walia Docs | Enterprise Specification</title>
    
    <!-- Core Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        /* Professional Font Stack */
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap');
        
        :root {
            --bg-canvas: #020617;
            --bg-surface: #0f172a;
            --accent-primary: #6366f1;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            /* Typographic Constants */
            --max-reading-width: 820px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            /* Security: Lockdown */
            -webkit-user-select: none; 
            user-select: none;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- ENTERPRISE MARKDOWN TYPOGRAPHY --- */
        #render-area {
            max-width: var(--max-reading-width);
            margin: 0 auto;
            font-size: 1.05rem;
            letter-spacing: -0.011em;
        }

        /* Vertical Rhythm & Spacing */
        #render-area h1 { font-size: 2.75rem; font-weight: 800; margin-bottom: 2.5rem; letter-spacing: -0.025em; color: #fff; line-height: 1.2; }
        #render-area h2 { font-size: 1.75rem; font-weight: 700; margin-top: 4rem; margin-bottom: 1.5rem; color: #f1f5f9; border-bottom: 1px solid #1e293b; padding-bottom: 0.75rem; }
        #render-area h3 { font-size: 1.25rem; font-weight: 600; margin-top: 2.5rem; margin-bottom: 1rem; color: var(--accent-primary); text-transform: uppercase; letter-spacing: 0.05em; }
        
        #render-area p { line-height: 1.85; margin-bottom: 1.75rem; color: #cbd5e1; font-weight: 400; }
        
        /* Code Spacing */
        #render-area code { 
            font-family: 'JetBrains Mono', monospace;
            background: rgba(99, 102, 241, 0.1); 
            color: #a5b4fc; 
            padding: 0.2rem 0.45rem; 
            border-radius: 6px; 
            font-size: 0.9em;
            letter-spacing: 0;
        }
        
        #render-area pre { 
            margin: 2.5rem 0; 
            padding: 1.75rem; 
            border-radius: 16px; 
            background: #0b0f1a !important; 
            border: 1px solid #1e293b;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* List Dynamics */
        #render-area ul, #render-area ol { margin-bottom: 2rem; padding-left: 1.5rem; }
        #render-area li { margin-bottom: 0.85rem; line-height: 1.7; color: #cbd5e1; position: relative; list-style: none; }
        #render-area ul li::before { 
            content: ""; position: absolute; left: -1.5rem; top: 0.7rem; 
            width: 6px; height: 6px; background: var(--accent-primary); border-radius: 50%; 
        }

        /* Security Media Query */
        @media print { body { display: none !important; } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .nav-item-active {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.1) 0%, transparent 100%);
            color: #818cf8 !important;
            border-left: 2px solid #6366f1;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Global Header -->
    <header class="h-14 border-b border-slate-800/60 bg-slate-950/80 backdrop-blur-xl flex items-center justify-between px-8 z-50">
        <div class="flex items-center gap-4">
            <div class="w-6 h-6 bg-indigo-600 rounded shadow-lg shadow-indigo-500/20 flex items-center justify-center">
                <div class="w-2 h-2 bg-white rounded-full"></div>
            </div>
            <span class="font-bold text-xs tracking-[0.3em] text-white uppercase">Walia Systems</span>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="hidden lg:flex items-center gap-3 text-[10px] font-bold text-slate-500 tracking-widest uppercase">
                <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-pulse"></span>
                Sovereign Environment // Read Only
            </div>
            <button id="mobile-toggle" class="md:hidden text-slate-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="absolute inset-y-0 left-0 w-72 bg-slate-950 border-r border-slate-900 z-40 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 flex flex-col">
            <div class="p-8 overflow-y-auto flex-1">
                <div id="nav-container" class="space-y-10">
                    <!-- Nav items injected here -->
                </div>
            </div>
        </aside>

        <!-- Document Viewer -->
        <main class="flex-1 overflow-y-auto bg-slate-950 px-6">
            <div id="scroll-container" class="py-20">
                <div id="welcome" class="max-w-xl mx-auto text-center py-20">
                    <h1 class="text-4xl font-extrabold text-slate-200 mb-4 tracking-tighter">Documentation Hub</h1>
                    <p class="text-slate-500 text-lg leading-relaxed">Select a technical module from the directory to initialize reading.</p>
                </div>
                
                <article id="render-area" class="hidden"></article>
            </div>
        </main>

        <!-- Overlay for Mobile -->
        <div id="overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-30 hidden"></div>
    </div>

    <script>
        const DOCS_PATH = 'docs/';
        const MANIFEST_URL = 'docs/manifest.json';

        // SECURITY HARDENING
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && ['s','c','u','p','a'].includes(e.key.toLowerCase())) e.preventDefault();
        });

        // DOM ELEMENTS
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const navContainer = document.getElementById('nav-container');
        const renderArea = document.getElementById('render-area');
        const welcome = document.getElementById('welcome');

        const toggleNav = () => {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        };

        document.getElementById('mobile-toggle').onclick = toggleNav;
        overlay.onclick = toggleNav;

        // FETCH MANIFEST & RENDER SIDEBAR
        async function loadApp() {
            try {
                const res = await fetch(MANIFEST_URL);
                const manifest = await res.json();
                
                navContainer.innerHTML = '';
                
                for (const [category, files] of Object.entries(manifest)) {
                    const group = document.createElement('div');
                    group.innerHTML = `<h3 class="text-[10px] font-black text-slate-600 uppercase tracking-[0.3em] mb-4 px-4">${category}</h3>`;
                    
                    const list = document.createElement('div');
                    list.className = "flex flex-col";
                    
                    files.forEach(path => {
                        const fileName = path.split('/').pop().replace('.md', '').replace(/^\d+_/, '').replace(/_/g, ' ');
                        const btn = document.createElement('button');
                        btn.className = "w-full text-left px-4 py-2.5 text-[13px] font-semibold text-slate-500 hover:text-indigo-400 transition-all truncate uppercase tracking-tight";
                        btn.innerText = fileName;
                        btn.onclick = () => fetchDoc(path, btn);
                        list.appendChild(btn);
                    });
                    
                    group.appendChild(list);
                    navContainer.appendChild(group);
                }
            } catch (err) {
                navContainer.innerHTML = `<p class="text-red-900 text-[10px] px-4">Error: manifest.json missing in docs/</p>`;
            }
        }

        // FETCH DOC & RENDER
        async function fetchDoc(path, btn) {
            // UI States
            document.querySelectorAll('#nav-container button').forEach(b => b.classList.remove('nav-item-active'));
            btn.classList.add('nav-item-active');
            
            if (window.innerWidth < 768) toggleNav();

            try {
                const res = await fetch(DOCS_PATH + path);
                const md = await res.text();
                
                welcome.classList.add('hidden');
                renderArea.classList.remove('hidden');
                
                // Content Rendering
                renderArea.innerHTML = marked.parse(md);
                
                // Post-render Highlight
                Prism.highlightAllUnder(renderArea);
                
                // Scroll reset
                document.querySelector('main').scrollTo({top: 0, behavior: 'smooth'});
            } catch (e) {
                renderArea.innerHTML = `<p class="text-red-500">Resource unreachable.</p>`;
            }
        }

        loadApp();
    </script>
</body>
</html>
