<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walia Docs | Secure Specification</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --bg-deep: #020617;
            --bg-panel: #0f172a;
            --accent: #6366f1;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-deep);
            color: var(--text-main);
            /* Security: Disable Text Selection */
            -webkit-user-select: none; user-select: none;
            overflow: hidden;
        }

        /* Enterprise Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Content Markdown Styling */
        #render-area h1 { @apply text-4xl font-extrabold text-white mb-8 tracking-tight; }
        #render-area h2 { @apply text-2xl font-bold text-white mt-12 mb-4 border-b border-slate-800 pb-2; }
        #render-area h3 { @apply text-lg font-semibold text-indigo-400 mt-8 mb-2 uppercase tracking-wider; }
        #render-area p { @apply text-slate-400 leading-relaxed mb-6 text-[17px]; }
        #render-area code { @apply font-mono text-indigo-300 bg-indigo-500/10 px-1.5 py-0.5 rounded text-[0.9em]; }
        #render-area pre { @apply bg-slate-900/50 border border-slate-800 rounded-2xl p-6 my-8 shadow-2xl overflow-x-auto; }
        #render-area ul { @apply space-y-3 mb-8 text-slate-400 list-none pl-1; }
        #render-area ul li::before { content: "→"; @apply text-indigo-500 mr-3 font-bold; }
        
        /* Security Overlay */
        @media print { body { display: none !important; } }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .active-nav {
            @apply bg-indigo-600/10 text-indigo-400 border-r-2 border-indigo-500;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="h-16 border-b border-slate-800/60 bg-slate-950/50 backdrop-blur-md flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg shadow-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <span class="font-bold text-lg tracking-tighter text-white uppercase">Walia <span class="text-indigo-500">Docs</span></span>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="hidden md:flex items-center gap-2 text-[10px] font-bold tracking-[0.2em] text-slate-500">
                <span class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
                ENCRYPTED READ-ONLY SESSION
            </div>
            <button id="mobile-toggle" class="md:hidden text-slate-400 p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <!-- Sidebar -->
        <aside id="sidebar" class="absolute inset-y-0 left-0 w-80 bg-slate-950 border-r border-slate-800/50 z-40 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 flex flex-col">
            <div class="p-6 overflow-y-auto flex-1 custom-scrollbar">
                <div id="nav-content" class="space-y-8">
                    <!-- Skeleton Loader -->
                    <div class="animate-pulse space-y-4">
                        <div class="h-3 bg-slate-800 w-1/3 rounded"></div>
                        <div class="h-8 bg-slate-900 rounded-lg"></div>
                        <div class="h-8 bg-slate-900 rounded-lg"></div>
                    </div>
                </div>
            </div>
            <div class="p-4 border-t border-slate-800/50 text-[10px] text-center text-slate-600 font-medium tracking-widest uppercase">
                &copy; 2024 Walia Systems
            </div>
        </aside>

        <!-- Content Viewer -->
        <main class="flex-1 overflow-y-auto bg-[#020617] relative">
            <div id="loading-line" class="absolute top-0 left-0 h-0.5 bg-indigo-500 transition-all duration-500 opacity-0" style="width: 0%"></div>
            
            <div class="max-w-4xl mx-auto px-6 py-16 md:px-12">
                <div id="welcome" class="py-24 text-center">
                    <div class="inline-block p-4 rounded-3xl bg-slate-900/50 border border-slate-800 mb-6">
                        <svg class="w-12 h-12 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-white mb-2">Knowledge Base</h2>
                    <p class="text-slate-500 text-sm">Select a technical specification from the library to view.</p>
                </div>
                
                <article id="render-area" class="fade-in hidden"></article>
            </div>
        </main>

        <!-- Mobile Overlay -->
        <div id="overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden"></div>
    </div>

    <script>
        const MANIFEST_URL = 'docs/manifest.json';
        const DOCS_BASE = 'docs/';

        // HARDENED SECURITY
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && ['s','c','u','p','a'].includes(e.key.toLowerCase())) {
                e.preventDefault();
            }
        });

        // UI ELEMENTS
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const navContent = document.getElementById('nav-content');
        const renderArea = document.getElementById('render-area');
        const welcome = document.getElementById('welcome');
        const loading = document.getElementById('loading-line');

        const toggleNav = () => {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        };

        document.getElementById('mobile-toggle').onclick = toggleNav;
        overlay.onclick = toggleNav;

        // FETCH & BUILD
        async function loadDocs() {
            try {
                const response = await fetch(MANIFEST_URL);
                const manifest = await response.json();
                buildSidebar(manifest);
            } catch (err) {
                navContent.innerHTML = `<p class="text-red-400 text-xs">Manifest Error: Check docs/manifest.json</p>`;
            }
        }

        function buildSidebar(manifest) {
            navContent.innerHTML = '';
            for (const [category, files] of Object.entries(manifest)) {
                const group = document.createElement('div');
                group.innerHTML = `<h3 class="text-[10px] font-extrabold text-slate-500 uppercase tracking-[0.25em] mb-4 px-3">${category}</h3>`;
                
                const list = document.createElement('div');
                list.className = "space-y-1";
                
                files.forEach(path => {
                    const name = path.split('/').pop().replace('.md', '').replace(/^\d+_/, '').replace(/_/g, ' ');
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left px-4 py-2.5 text-[13px] font-medium text-slate-400 rounded-xl hover:bg-slate-900 hover:text-white transition-all flex items-center gap-3 group";
                    btn.innerHTML = `
                        <span class="w-1 h-1 rounded-full bg-slate-700 group-hover:bg-indigo-500 transition-colors"></span>
                        <span class="truncate capitalize">${name}</span>
                    `;
                    btn.onclick = () => fetchFile(path, btn);
                    list.appendChild(btn);
                });
                
                group.appendChild(list);
                navContent.appendChild(group);
            }
        }

        async function fetchFile(path, btn) {
            // UI Active State
            document.querySelectorAll('#nav-content button').forEach(b => b.classList.remove('active-nav', 'text-white'));
            btn.classList.add('active-nav', 'text-white');
            
            if (window.innerWidth < 768) toggleNav();
            
            // Loading Animation
            loading.style.opacity = '1';
            loading.style.width = '40%';
            
            try {
                const res = await fetch(DOCS_BASE + path);
                const text = await res.text();
                loading.style.width = '100%';
                
                welcome.classList.add('hidden');
                renderArea.classList.remove('hidden');
                
                // Set and Parse
                renderArea.innerHTML = marked.parse(text);
                
                // Highlight Code
                Prism.highlightAllUnder(renderArea);
                
                setTimeout(() => {
                    loading.style.opacity = '0';
                    loading.style.width = '0%';
                }, 400);

                document.querySelector('main').scrollTo({top: 0, behavior: 'smooth'});

            } catch (e) {
                renderArea.innerHTML = `<p class="text-red-500 text-center">Security Error: File inaccessible.</p>`;
            }
        }

        // Initialize
        loadDocs();
    </script>
</body>
</html>
